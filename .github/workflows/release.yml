name: Release

# Releases are version-driven: bump `version` in Cargo.toml and merge to main.
# This workflow detects the new version, tags it (vX.Y.Z), cross-builds binaries
# for macOS / Linux / Windows, and publishes them to a GitHub Release.

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: cxbridge

jobs:
  check-version:
    name: check-version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Check whether the tag already exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: build (${{ matrix.target }})
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install musl tools (Linux musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Archive (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd "target/${{ matrix.target }}/release"
          tar czf "../../../${BIN_NAME}-${{ matrix.target }}.tar.gz" "${BIN_NAME}"
      - name: Archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${env:BIN_NAME}.exe" -DestinationPath "${env:BIN_NAME}-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            ${{ env.BIN_NAME }}-${{ matrix.target }}.tar.gz
            ${{ env.BIN_NAME }}-${{ matrix.target }}.zip
          if-no-files-found: error

  release:
    name: release
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create and push the tag
        run: |
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ env.BIN_NAME }}-*.tar.gz
            ${{ env.BIN_NAME }}-*.zip

  publish-crate:
    name: publish-crate
    needs: [check-version, build, release]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Publishes to crates.io only when CARGO_REGISTRY_TOKEN is configured;
      # otherwise the step is a no-op so the release still succeeds.
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN is not set; skipping crates.io publish."
            exit 0
          fi
          cargo publish --locked

  update-homebrew:
    name: update-homebrew
    needs: [check-version, release]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      # Dispatches a formula bump to rikeda71/homebrew-tap only when
      # HOMEBREW_TAP_TOKEN is configured; otherwise the step is a no-op.
      - name: Dispatch formula update to homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN is not set; skipping Homebrew formula update."
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/rikeda71/homebrew-tap/dispatches \
            -d "{\"event_type\":\"update-formula\",\"client_payload\":{\"formula\":\"cxbridge\",\"repo\":\"rikeda71/cxbridge\",\"version\":\"$VERSION\"}}"
